<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil — Tornea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img src="img/logo.png" alt="Tornea" class="logo-icon" />
        <span class="logo-text">Tornea</span>
      </a>

      <nav class="main-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="torneos.html" class="nav-link">Torneos</a>

        <a href="register.html" class="btn btn-gradient">Registrarse</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="perfil-section">
      <div class="container">
        <div class="perfil-card">

          <div class="perfil-avatar">JP</div>

          <h1 class="perfil-nombre">Juan Pérez</h1>

          <div class="perfil-badges">
            <span class="perfil-badge">Participante</span>
            <span class="perfil-badge perfil-badge-publico">Perfil público</span>
          </div>

          <div class="perfil-info">
            <div class="perfil-info-item">
              <span class="perfil-info-label">Correo electrónico</span>
              <span class="perfil-info-value">juan.perez@email.com</span>
            </div>
            <div class="perfil-info-item">
              <span class="perfil-info-label">Fecha de nacimiento</span>
              <span class="perfil-info-value">15 de marzo de 1998</span>
            </div>
          </div>

          <a href="perfil-editar.html" class="btn btn-gradient btn-lg btn-block">EDITAR PERFIL</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">

      <div class="social-links">
        <a href="#" aria-label="Facebook" class="social-icon">
